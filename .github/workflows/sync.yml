name: Sync to Hugging Face
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Configure Git LFS
        run: |
          git config --global user.email "dhruv@example.com"
          git config --global user.name "Dhruv Rajput"
          git lfs install
          # Force track the model file
          git lfs track "backend/model.h5"
          git add .gitattributes
          # We check if there's anything to commit so the script doesn't fail
          git diff --quiet && git diff --staged --quiet || git commit -m "workflow: track model with LFS"

      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # Use the token to push including LFS objects
          git push --force https://Dhruv2007:$HF_TOKEN@huggingface.co/spaces/Dhruv2007/electricity-ai main
